name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Lint (svelte-check) + testes unitários (Vitest) + build de produção.
  # Tudo determinístico — não depende de rede externa.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint / type-check
        run: npm run lint
      - name: Testes unitários
        run: npm test
      - name: Build
        run: npm run build

  # Fluxo ponta a ponta (Playwright). Roda a UI real contra o PubChem, por isso
  # fica em job separado e com retry (ver playwright.config.ts).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium
      - name: Testes ponta a ponta
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
